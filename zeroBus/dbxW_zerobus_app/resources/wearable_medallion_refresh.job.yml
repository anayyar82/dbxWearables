# Triggers an update on the bundle-defined wearable medallion DLT (single pipeline).

resources:
  jobs:
    wearable_medallion_refresh:
      name: "[${bundle.target}] dbxWearables — Refresh wearable medallion DLT"

      tasks:
        - task_key: refresh_medallion
          pipeline_task:
            pipeline_id: ${resources.pipelines.wearable_medallion.id}

      max_concurrent_runs: 1
      timeout_seconds: 7200

      tags:
        component: medallion_refresh
        workload: wearables_dlt
