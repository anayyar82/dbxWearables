# Unity Catalog schema for dbxWearables ZeroBus data.
#
# This is the ONLY resource file that should reference ${var.catalog} and
# ${var.schema} directly. All other resources in this bundle (and in the
# companion dbxW_zerobus app bundle) must reference the schema through
# deployed-resource substitutions:
#
#   Catalog name:  ${resources.schemas.wearables_schema.catalog_name}
#   Schema name:   ${resources.schemas.wearables_schema.name}
#   Schema ID:     ${resources.schemas.wearables_schema.id}
#   Full name:     ${resources.schemas.wearables_schema.catalog_name}.${resources.schemas.wearables_schema.name}
#
# This ensures the schema identity is always derived from the actual
# deployed object, not from a loosely-coupled variable.
#
# NOTE: ZeroBus SPN grants (USE_SCHEMA, SELECT, MODIFY) are applied
# dynamically by the DDL notebook (target-table-ddl), not declared here.
# Only admin, deploy SP, and user group grants are declared below.

resources:
  schemas:
    wearables_schema:
      name: ${var.schema}
      catalog_name: ${var.catalog}
      comment: >
        Wearable and health-app data ingested via Databricks ZeroBus.
        Houses bronze (raw), silver (cleaned), and gold (aggregated) tables
        for Apple HealthKit and other wearable sources.

      # Prevent accidental deletion — this schema holds all wearable data
      lifecycle:
        prevent_destroy: true

      # Base grants — extended per-target below
      grants:
        - principal: account users
          privileges:
            - USE_SCHEMA

# ---------------------------------------------------------------------------
# Target-specific grants
# (ZeroBus SPN grants are handled by the DDL notebook)
# ---------------------------------------------------------------------------
targets:

  dev:
    resources:
      schemas:
        wearables_schema:
          grants:
            - principal: account users
              privileges:
                - USE_SCHEMA
            - principal: ${var.run_as_user}
              privileges:
                - ALL_PRIVILEGES

  hls_fde:
    resources:
      schemas:
        wearables_schema:
          grants:
            # Deploy service principal — full control
            - principal: ${var.higher_level_service_principal}
              privileges:
                - ALL_PRIVILEGES
            # Admin user
            - principal: matthew.giglia@databricks.com
              privileges:
                - ALL_PRIVILEGES
            # Read access for all workspace users
            - principal: account users
              privileges:
                - USE_SCHEMA
                - SELECT

  prod:
    resources:
      schemas:
        wearables_schema:
          grants:
            - principal: matthew.giglia@databricks.com
              privileges:
                - ALL_PRIVILEGES
            - principal: account users
              privileges:
                - USE_SCHEMA
                - SELECT
