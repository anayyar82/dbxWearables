# Secret scope for storing ZeroBus and wearable ingestion credentials.
#
# Secrets are auto-provisioned by the ensure-service-principal notebook
# (first task of the wearables_uc_setup job). Manual population is only
# needed if the automated flow fails (e.g., missing account admin perms).
#
# Auto-provisioned keys:
#   client_id          — SPN application_id (OAuth M2M client identifier)
#   client_secret      — OAuth M2M secret (generated once, cannot be retrieved later)
#   workspace_url      — Databricks workspace URL
#   zerobus_endpoint   — ZeroBus Ingest server endpoint (derived from workspace ID + region)
#   target_table_name  — Fully qualified bronze table name (catalog.schema.table)
#
# Manual fallback (if auto-provisioning fails):
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key client_id --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key client_secret --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key zerobus_endpoint --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key workspace_url --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key target_table_name --string-value "<catalog.schema.table>"
#
# NOTE: The ZeroBus SPN's READ permission on this scope is granted dynamically
# by the ensure-service-principal notebook (via secrets.put_acl), not
# declared here. Only admin/deploy permissions are declared below.

resources:
  secret_scopes:
    zerobus_secret_scope:
      name: ${var.secret_scope_name}

      # Databricks-managed backend (not Azure Key Vault or AWS Secrets Manager backed)
      backend_type: DATABRICKS

      # Prevent accidental deletion of the secret scope
      lifecycle:
        prevent_destroy: true

# ---------------------------------------------------------------------------
# Target-specific permissions
# (ZeroBus SPN READ is handled by the ensure-service-principal notebook)
# ---------------------------------------------------------------------------
targets:

  dev:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - user_name: ${var.run_as_user}
              level: MANAGE
            - user_name: matthew.giglia@databricks.com
              level: MANAGE

  hls_fde:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher-level service principal for automated deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE

  prod:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher-level service principal for automated deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE
