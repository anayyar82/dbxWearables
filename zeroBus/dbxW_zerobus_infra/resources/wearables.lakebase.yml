# Lakebase Autoscaling — Wearables OLTP Database
#
# PostgreSQL-compatible database for the dbxWearables ZeroBus solution.
# Provides low-latency OLTP storage for the AppKit application layer —
# user sessions, app state, sync metadata, and any operational data that
# doesn't belong in the analytical lakehouse.
#
# Resource hierarchy:
#   postgres_project → postgres_branch → postgres_endpoint
#
# The project creates a Lakebase Autoscaling instance with a single
# protected main branch and a read-write endpoint. The AppKit app bundle
# references this via the Lakebase plugin:
#   appkit.plugins.lakebase()
#
# NOTE: Deploying this resource starts the Lakebase instance and incurs
#       cost immediately. The endpoint uses autoscaling with scale-to-zero
#       capability (min 0.5 CU) to minimize idle cost.
#
# Requires Databricks CLI >= 0.287.0

resources:

  # -------------------------------------------------------------------------
  # Project — top-level Lakebase Autoscaling container
  # -------------------------------------------------------------------------
  postgres_projects:
    wearables_lakebase:
      project_id: dbxw-zerobus-wearables
      display_name: dbxWearables ZeroBus — Lakebase
      pg_version: 17

      # Retain 7 days of history for point-in-time recovery (default)
      history_retention_duration: "604800s"

      # Smallest autoscaling endpoint by default — overridden per target
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5
        autoscaling_limit_max_cu: 2

      # Prevent accidental deletion — this project holds operational data
      lifecycle:
        prevent_destroy: true

  # -------------------------------------------------------------------------
  # Branch — main (default, protected)
  # -------------------------------------------------------------------------
  postgres_branches:
    wearables_main:
      parent: ${resources.postgres_projects.wearables_lakebase.id}
      branch_id: main
      no_expiry: true
      is_protected: true

      lifecycle:
        prevent_destroy: true

  # -------------------------------------------------------------------------
  # Endpoint — primary read-write (autoscaling)
  # -------------------------------------------------------------------------
  postgres_endpoints:
    wearables_primary:
      parent: ${resources.postgres_branches.wearables_main.id}
      endpoint_id: primary
      endpoint_type: ENDPOINT_TYPE_READ_WRITE

      # Autoscaling limits — overridden per target below
      autoscaling_limit_min_cu: 0.5
      autoscaling_limit_max_cu: 2

# ---------------------------------------------------------------------------
# Target-specific overrides
# ---------------------------------------------------------------------------
targets:

  dev:
    resources:
      postgres_projects:
        wearables_lakebase:
          display_name: dbxWearables ZeroBus — Lakebase [${bundle.target}]
      postgres_endpoints:
        wearables_primary:
          # Minimal compute for development
          autoscaling_limit_min_cu: 0.5
          autoscaling_limit_max_cu: 2

  hls_fde:
    resources:
      postgres_projects:
        wearables_lakebase:
          display_name: dbxWearables ZeroBus — Lakebase
      postgres_endpoints:
        wearables_primary:
          # Higher ceiling for production workloads
          autoscaling_limit_min_cu: 0.5
          autoscaling_limit_max_cu: 4

  prod:
    resources:
      postgres_projects:
        wearables_lakebase:
          display_name: dbxWearables ZeroBus — Lakebase
      postgres_endpoints:
        wearables_primary:
          autoscaling_limit_min_cu: 0.5
          autoscaling_limit_max_cu: 4
